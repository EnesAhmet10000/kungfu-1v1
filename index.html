<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kung Fu Panda 1 v 1 Mode</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { overscroll-behavior-y: contain; }
    </style>
</head>
<body class="bg-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const FairArenaGame = () => {
            // STATE 
            const [gameState, setGameState] = useState('menu'); 
            const [scoreP1, setScoreP1] = useState(0);
            const [scoreP2, setScoreP2] = useState(0);
            const [timeLeft, setTimeLeft] = useState(30);
            const [countdown, setCountdown] = useState(3);
            const [cameraReady, setCameraReady] = useState(false);
            const [winner, setWinner] = useState(null);

            // REFLER
            const gameStateRef = useRef('menu'); 
            const targetSequenceRef = useRef([]); 
            const p1IndexRef = useRef(0);
            const p2IndexRef = useRef(0);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const handsRef = useRef(null);
            const timerRef = useRef(null);

            // KOORDİNATLAR 
            const targetsP1 = [
                { id: 0, x: 150, y: 150 },
                { id: 1, x: 300, y: 150 },
                { id: 2, x: 150, y: 350 },
                { id: 3, x: 300, y: 350 }  
            ];
            
            const targetsP2 = [
                { id: 0, x: 650, y: 150 },
                { id: 1, x: 500, y: 150 },
                { id: 2, x: 650, y: 350 },
                { id: 3, x: 500, y: 350 }  
            ];

            const updateGameState = (newState) => {
                setGameState(newState);
                gameStateRef.current = newState; 
            };

            const playSound = (type) => {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (type === 'p1') osc.frequency.value = 600; 
                else if (type === 'p2') osc.frequency.value = 800; 
                else osc.frequency.value = 400;

                osc.type = 'square';
                gain.gain.value = 0.05;
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            };

            useEffect(() => {
                let animationFrameId;

                const init = async () => {
                    const hands = new window.Hands({
                        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                    });
                    
                    hands.setOptions({
                        maxNumHands: 2,
                        modelComplexity: 1,
                        minDetectionConfidence: 0.5,
                        minTrackingConfidence: 0.5
                    });
                    
                    hands.onResults(onResults);
                    handsRef.current = hands;

                    try {
                        let stream;
                        try {
                            // المحاولة 1: الكاميرا الأمامية
                            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                        } catch(e) {
                            // المحاولة 2: أي كاميرا متوفرة
                            stream = await navigator.mediaDevices.getUserMedia({ video: true });
                        }
                        
                        if (videoRef.current) {
                            videoRef.current.srcObject = stream;
                            
                            // iPhone/Safari'yi kandırmak ve videoyu zorla oynatmak için kritik ayarlar
                            videoRef.current.setAttribute("playsinline", true);
                            videoRef.current.setAttribute("webkit-playsinline", true);

                            // Safari'de onloadeddata yerine onloadedmetadata daha kararlı çalışır
                            videoRef.current.onloadedmetadata = async () => {
                                setCameraReady(true); // burada "Kamera Yükleniyor..." butonu aktifleşir
                                
                                const detectFrame = async () => {
                                    if (videoRef.current && videoRef.current.readyState >= 2 && handsRef.current) {
                                        await handsRef.current.send({ image: videoRef.current });
                                    }
                                    animationFrameId = requestAnimationFrame(detectFrame);
                                };
                                detectFrame();
                            };

                            // Oynatma komutu
                            await videoRef.current.play().catch(err => console.error("Play Error:", err));
                        }
                    } catch (e) {
                        alert("Kamera izni gerekli veya kamera başka bir uygulamada açık!");
                    }
                };
                init();

                return () => {
                    if (animationFrameId) cancelAnimationFrame(animationFrameId);
                    if (videoRef.current && videoRef.current.srcObject) {
                        videoRef.current.srcObject.getTracks().forEach(track => track.stop());
                    }
                };
            }, []);

            const onResults = (results) => {
                if (!canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d');
                const W = canvasRef.current.width; 
                const H = canvasRef.current.height; 

                ctx.save();
                ctx.clearRect(0, 0, W, H);
                ctx.scale(-1, 1);
                ctx.translate(-W, 0);
                ctx.drawImage(results.image, 0, 0, W, H);
                ctx.restore();

                ctx.fillStyle = 'rgba(255, 200, 0, 0.1)';
                ctx.fillRect(0, 0, W/2, H);
                ctx.fillStyle = 'rgba(0, 100, 255, 0.1)';
                ctx.fillRect(W/2, 0, W/2, H);
                ctx.beginPath();
                ctx.moveTo(W/2, 0);
                ctx.lineTo(W/2, H);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 4;
                ctx.stroke();

                if (gameStateRef.current === 'playing') {
                    if (targetSequenceRef.current.length > 0 && p1IndexRef.current < targetSequenceRef.current.length) {
                        const targetId = targetSequenceRef.current[p1IndexRef.current];
                        const t = targetsP1[targetId];
                        drawTarget(ctx, t.x, t.y, '#fbbf24');
                    }
                    if (targetSequenceRef.current.length > 0 && p2IndexRef.current < targetSequenceRef.current.length) {
                        const targetId = targetSequenceRef.current[p2IndexRef.current];
                        const t = targetsP2[targetId];
                        drawTarget(ctx, t.x, t.y, '#3b82f6');
                    }
                }

                if (results.multiHandLandmarks) {
                    for (const landmarks of results.multiHandLandmarks) {
                        const tip = landmarks[8];
                        const x = (1 - tip.x) * W; 
                        const y = tip.y * H;

                        const isPlayer1 = x < W/2;
                        const color = isPlayer1 ? '#FACC15' : '#3B82F6';

                        ctx.beginPath();
                        ctx.arc(x, y, 20, 0, 2 * Math.PI);
                        ctx.fillStyle = color;
                        ctx.fill();
                        ctx.strokeStyle = 'white';
                        ctx.lineWidth = 3;
                        ctx.stroke();

                        if (gameStateRef.current === 'playing') {
                            if (isPlayer1) checkHitP1(x, y);
                            else checkHitP2(x, y);
                        }
                    }
                }
            };

            const drawTarget = (ctx, x, y, color) => {
                ctx.beginPath();
                ctx.arc(x, y, 45, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.8;
                ctx.fill();
                ctx.globalAlpha = 1.0;
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(x, y, 15, 0, 2 * Math.PI);
                ctx.fillStyle = 'white';
                ctx.fill();
            };

            const checkHitP1 = (x, y) => {
                if (p1IndexRef.current >= targetSequenceRef.current.length) return;
                const targetId = targetSequenceRef.current[p1IndexRef.current];
                const t = targetsP1[targetId];
                const dist = Math.hypot(x - t.x, y - t.y);

                if (dist < 60) {
                    p1IndexRef.current += 1;
                    setScoreP1(p1IndexRef.current);
                    playSound('p1');
                }
            };

            const checkHitP2 = (x, y) => {
                if (p2IndexRef.current >= targetSequenceRef.current.length) return;
                const targetId = targetSequenceRef.current[p2IndexRef.current];
                const t = targetsP2[targetId];
                const dist = Math.hypot(x - t.x, y - t.y);

                if (dist < 60) {
                    p2IndexRef.current += 1;
                    setScoreP2(p2IndexRef.current);
                    playSound('p2');
                }
            };

            const generateFairSequence = () => {
                const seq = [];
                let last = -1;
                for(let i=0; i<100; i++) {
                    let next;
                    do { next = Math.floor(Math.random() * 4); } while(next === last);
                    seq.push(next);
                    last = next;
                }
                return seq;
            };

            const startCountdown = () => {
                updateGameState('countdown');
                setCountdown(3);
                let c = 3;
                const i = setInterval(() => {
                    c--;
                    setCountdown(c);
                    if (c <= 0) {
                        clearInterval(i);
                        startGame();
                    }
                }, 1000);
            };

            const startGame = () => {
                setScoreP1(0);
                setScoreP2(0);
                p1IndexRef.current = 0;
                p2IndexRef.current = 0;
                targetSequenceRef.current = generateFairSequence();
                
                updateGameState('playing');
                setTimeLeft(30);

                if (timerRef.current) clearInterval(timerRef.current);
                timerRef.current = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            endGame();
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
            };

            const endGame = () => {
                clearInterval(timerRef.current);
                updateGameState('gameover');
                
                const s1 = p1IndexRef.current;
                const s2 = p2IndexRef.current;

                if (s1 > s2) setWinner('SARI KAZANDI!');
                else if (s2 > s1) setWinner('MAVİ KAZANDI!');
                else setWinner('BERABERE!');
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-2 md:p-6 font-sans w-full bg-gray-900">
                    
                    {/* Skor Tablosu */}
                    <div className="flex w-full max-w-4xl mb-2 md:mb-4 rounded-xl md:rounded-2xl overflow-hidden shadow-2xl border-2 md:border-4 border-gray-700">
                        <div className="flex-1 bg-yellow-400 p-2 md:p-4 flex flex-col items-center justify-center">
                            <h2 className="text-xs md:text-xl font-bold text-gray-800 text-center">1. OYUNCU</h2>
                            <span className="text-4xl md:text-7xl font-black text-gray-900">{scoreP1}</span>
                        </div>
                        <div className="bg-gray-800 p-2 md:p-6 flex flex-col items-center justify-center min-w-[70px] md:min-w-[180px] border-x-2 md:border-x-4 border-gray-700">
                            <span className="text-[10px] md:text-base text-gray-400 font-bold mb-1">SÜRE</span>
                            <span className={`text-2xl md:text-5xl font-mono font-bold ${timeLeft < 5 ? 'text-red-500 animate-pulse' : 'text-white'}`}>
                                {timeLeft}
                            </span>
                        </div>
                        <div className="flex-1 bg-blue-600 p-2 md:p-4 flex flex-col items-center justify-center">
                            <h2 className="text-xs md:text-xl font-bold text-white text-center">2. OYUNCU</h2>
                            <span className="text-4xl md:text-7xl font-black text-white">{scoreP2}</span>
                        </div>
                    </div>

                    {/* Oyun Alanı */}
                    <div className="relative bg-black rounded-xl overflow-hidden shadow-2xl border-2 md:border-4 border-gray-700 w-full max-w-4xl aspect-[8/5]">
                        <video 
                            ref={videoRef} 
                            style={{ position: 'absolute', left: 0, top: 0, width: '100%', height: '100%', opacity: 0.001, zIndex: -1 }} 
                            autoPlay 
                            playsInline 
                            muted 
                        />
                        <canvas ref={canvasRef} width={800} height={500} className="w-full h-full object-cover" />

                        {gameState === 'menu' && (
                            <div className="absolute inset-0 bg-black bg-opacity-90 flex flex-col items-center justify-center gap-4 md:gap-6 z-10 p-4 text-center">
                                <h1 className="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-blue-500">
                                    VS MODU
                                </h1>
                                <p className="text-gray-300 text-sm md:text-lg">İki oyuncu kamera karşısına geçin!<br/><span className="text-yellow-400 text-xs">(Lütfen telefonu yan çevirin)</span></p>
                                <button 
                                    onClick={startCountdown}
                                    disabled={!cameraReady}
                                    className="bg-green-500 text-white px-8 md:px-12 py-3 md:py-5 rounded-full font-black text-xl md:text-2xl hover:scale-105 transition disabled:opacity-50 disabled:bg-gray-600"
                                >
                                    {cameraReady ? "BAŞLA" : "Kamera Yükleniyor..."}
                                </button>
                            </div>
                        )}

                        {gameState === 'countdown' && (
                            <div className="absolute inset-0 bg-black bg-opacity-70 flex items-center justify-center z-20">
                                <div className="text-8xl md:text-[150px] font-black text-white animate-ping">
                                    {countdown}
                                </div>
                            </div>
                        )}

                        {gameState === 'gameover' && (
                            <div className="absolute inset-0 bg-black bg-opacity-95 flex flex-col items-center justify-center z-30 p-4 md:p-8 text-center">
                                <div className="text-3xl md:text-5xl font-black text-yellow-400 mb-6 md:mb-8 animate-bounce">
                                    {winner}
                                </div>
                                <button 
                                    onClick={() => updateGameState('menu')}
                                    className="bg-white hover:bg-gray-200 text-gray-900 px-6 md:px-10 py-3 md:py-4 rounded-xl font-bold text-lg md:text-xl transition"
                                >
                                    MENÜYE DÖN
                                </button>
                            </div>
                        )}
                    </div>

                    {/* Nasıl Oynanır Kılavuzu */}
                    <div className="w-full max-w-4xl mt-4 md:mt-6 bg-gray-800 rounded-xl md:rounded-2xl p-4 md:p-6 shadow-xl border border-gray-700">
                        <h3 className="text-xl md:text-2xl font-bold text-yellow-400 mb-3 md:mb-4 flex items-center gap-2">
                            <span>🎮</span> Nasıl Oynanır?
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4 text-gray-300 text-sm md:text-base">
                            <div className="bg-gray-700/50 p-3 md:p-4 rounded-lg border border-gray-600 hover:bg-gray-700 transition">
                                <span className="text-2xl mb-2 block">📸</span>
                                <p><strong>1. Kameraya İzin Ver:</strong> Oyuna başlamak için tarayıcının kamera erişimine izin verin.</p>
                            </div>
                            <div className="bg-gray-700/50 p-3 md:p-4 rounded-lg border border-gray-600 hover:bg-gray-700 transition">
                                <span className="text-2xl mb-2 block">📱</span>
                                <p><strong>2. Yan Çevir:</strong> Eğer telefondan oynuyorsanız, iki kişi sığabilmek için cihazınızı yan çevirin.</p>
                            </div>
                            <div className="bg-gray-700/50 p-3 md:p-4 rounded-lg border border-gray-600 hover:bg-gray-700 transition">
                                <span className="text-2xl mb-2 block">✋</span>
                                <p><strong>3. Hedefleri Vur:</strong> Ekranda beliren renkli hedeflere ellerinizle dokunarak süre bitmeden en yüksek puanı toplayın!</p>
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        ReactDOM.render(<FairArenaGame />, document.getElementById('root'));
    </script>
</body>
</html>
